# cargo-deny configuration: supply-chain gates for advisories, licenses,
# duplicate versions, and registry sources. Run: `cargo deny check`.

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "Unicode-3.0",
    "Zlib",
]

[bans]
multiple-versions = "deny"
wildcards = "deny"
skip = [
    { crate = "redox_syscall@0.5.18", reason = "Target-specific transitive dependencies require disjoint redox_syscall release lines" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
