name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: Check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup toolchain install 1.91.0 --profile minimal --component rustfmt,clippy --no-self-update
      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --workspace --locked

      - name: Test serde feature
        run: cargo test -p proj-core --features serde --locked

  gen-reference:
    name: Registry Generator
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup toolchain install 1.91.0 --profile minimal --component rustfmt,clippy --no-self-update
      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --manifest-path gen-reference/Cargo.toml -- --check

      - name: Clippy
        run: cargo clippy --manifest-path gen-reference/Cargo.toml --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --manifest-path gen-reference/Cargo.toml --all-targets --locked

      - name: Registry reproducibility
        run: ./scripts/check-registry-generation.sh

  coverage:
    name: Coverage
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup toolchain install 1.91.0 --profile minimal --component llvm-tools-preview --no-self-update
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Collect coverage
        run: |
          cargo llvm-cov --workspace --locked --lcov --output-path lcov.info
          cargo llvm-cov report --summary-only
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info

  deny:
    name: Supply Chain (cargo-deny)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  msrv:
    name: MSRV
    runs-on: ubuntu-24.04
    env:
      # Must match rust-version in Cargo.toml; overrides rust-toolchain.toml.
      RUSTUP_TOOLCHAIN: "1.85.0"
      # MSRV verifies compilability only; newer-toolchain lints are enforced
      # by the Check job.
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup toolchain install 1.85.0 --profile minimal --no-self-update
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets --locked

  no-default-features:
    name: No Default Features
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup toolchain install 1.91.0 --profile minimal --component rustfmt,clippy --no-self-update
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p proj-core --no-default-features --locked

  doc:
    name: Documentation
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup toolchain install 1.91.0 --profile minimal --component rustfmt,clippy --no-self-update
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps --locked
        env:
          RUSTDOCFLAGS: -D warnings

  wasm:
    name: WASM Check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup toolchain install 1.91.0 --profile minimal --component rustfmt,clippy --target wasm32-unknown-unknown --no-self-update
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --target wasm32-unknown-unknown --no-default-features --locked

  package:
    name: Packaging
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup toolchain install 1.91.0 --profile minimal --component rustfmt,clippy --no-self-update
      - uses: Swatinem/rust-cache@v2
      - run: ./scripts/verify-release-packaging.sh
